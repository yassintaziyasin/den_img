<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deno KV Image Uploader</title>
  <link rel="stylesheet" href="https://demo-styles.deno.deno.net/styles.css">
  <style>
    main { text-align: center; margin-top: 50px; }
    input[type="file"] { margin: 20px 0; }
    #status { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <main>
    <h1>Deno KV Uploader</h1>
    <p>Select an image to upload (Supports multi-megabyte files via Chunking).</p>
    
    <input type="file" id="fileInput" />
    <br/>
    <button onclick="upload()">Upload Image</button>
    <div id="status"></div>
  </main>

  <script>
    async function upload() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];
      if (!file) return alert('Please select a file');

      document.getElementById('status').innerText = 'Uploading (chunking data)...';
      
      const response = await fetch('/' + file.name, {
        method: 'PUT',
        body: file,
        headers: { 'Content-Type': file.type }
      });

      if (response.ok) {
        document.getElementById('status').innerHTML = 
          'Success! View image: <a href="/' + file.name + '" target="_blank">Click Here</a>';
      } else {
        const errorText = await response.text();
        document.getElementById('status').innerText = 'Error: ' + errorText;
      }
    }
  </script>
</body>
</html>
